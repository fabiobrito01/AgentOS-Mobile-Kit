<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="440" viewBox="0 0 1200 440" role="img" aria-labelledby="title desc">
  <title id="title">AgentOS Mobile Kit</title>
  <desc id="desc">Banner animado do ambiente AgentOS para Termux e Android.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#050914"/><stop offset=".55" stop-color="#0b1730"/><stop offset="1" stop-color="#101c3f"/></linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#765cff"/><stop offset=".5" stop-color="#178cff"/><stop offset="1" stop-color="#00d9f5"/></linearGradient>
    <radialGradient id="glow"><stop stop-color="#0aa9ff" stop-opacity=".32"/><stop offset="1" stop-color="#0aa9ff" stop-opacity="0"/></radialGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="18" stdDeviation="20" flood-opacity=".45"/></filter>
    <clipPath id="phoneScreen"><rect x="784" y="48" width="260" height="344" rx="30"/></clipPath>
  </defs>
  <rect width="1200" height="440" rx="24" fill="url(#bg)"/>
  <circle cx="1000" cy="90" r="300" fill="url(#glow)"><animate attributeName="opacity" values=".55;1;.55" dur="5s" repeatCount="indefinite"/></circle>
  <g opacity=".13" stroke="#5299df"><path d="M0 88H1200M0 176H1200M0 264H1200M0 352H1200"/><path d="M120 0V440M240 0V440M360 0V440M480 0V440M600 0V440M720 0V440M840 0V440M960 0V440M1080 0V440"/></g>
  <g font-family="Segoe UI,Arial,sans-serif">
    <text x="72" y="75" fill="#32d8ff" font-size="14" font-weight="700" letter-spacing="3">TERMUX · ANDROID · OPEN SOURCE</text>
    <text x="72" y="150" fill="#f1f5ff" font-size="58" font-weight="800" letter-spacing="-2">AgentOS</text>
    <text x="72" y="207" fill="url(#brand)" font-size="58" font-weight="800" letter-spacing="-2">Mobile Kit</text>
    <text x="75" y="252" fill="#a8b7d9" font-size="20">Seu ambiente de trabalho completo, direto no celular.</text>
    <g font-size="13" font-weight="650">
      <rect x="74" y="289" width="132" height="36" rx="18" fill="#ffffff0b" stroke="#334d78"/><text x="96" y="312" fill="#e9efff">GitHub Explorer</text>
      <rect x="218" y="289" width="112" height="36" rx="18" fill="#ffffff0b" stroke="#334d78"/><text x="243" y="312" fill="#e9efff">Workspace</text>
      <rect x="342" y="289" width="112" height="36" rx="18" fill="#ffffff0b" stroke="#334d78"/><text x="368" y="312" fill="#e9efff">Diagnóstico</text>
      <rect x="466" y="289" width="96" height="36" rx="18" fill="#ffffff0b" stroke="#334d78"/><text x="490" y="312" fill="#e9efff">Backup</text>
    </g>
    <text x="74" y="380" fill="#8497bc" font-size="14">CLIQUE PARA ABRIR O MANUAL E COMEÇAR →</text>
  </g>
  <g transform="translate(650 220)">
    <circle r="93" fill="none" stroke="#1e80ef" stroke-width="3" stroke-dasharray="7 12"><animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="18s" repeatCount="indefinite"/></circle>
    <circle r="67" fill="none" stroke="#765cff" stroke-width="3" stroke-dasharray="28 12"><animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="12s" repeatCount="indefinite"/></circle>
    <path d="M-42 39L0-48l42 87h-23L0-1l-20 40z" fill="url(#brand)"/>
    <circle cx="0" cy="-93" r="7" fill="#32d8ff"><animate attributeName="r" values="6;10;6" dur="2.4s" repeatCount="indefinite"/></circle>
  </g>
  <g filter="url(#shadow)">
    <rect x="770" y="30" width="288" height="380" rx="42" fill="#070b16" stroke="#405789" stroke-width="2"/>
    <rect x="784" y="48" width="260" height="344" rx="30" fill="#0c1325"/>
    <rect x="873" y="40" width="82" height="14" rx="7" fill="#060911"/>
    <g clip-path="url(#phoneScreen)" font-family="Consolas,monospace">
      <text x="806" y="86" fill="#32d8ff" font-size="13">$ agentos</text>
      <text x="806" y="116" fill="#f1f5ff" font-size="14" font-weight="700">AGENTOS MOBILE</text>
      <text x="806" y="144" fill="#8091b5" font-size="11">Escolha uma área:</text>
      <g font-size="12">
        <rect x="802" y="160" width="224" height="38" rx="8" fill="#14213d" stroke="#256dcc"/><text x="816" y="184" fill="#e7efff">1  GitHub Explorer</text>
        <rect x="802" y="206" width="224" height="38" rx="8" fill="#111a30" stroke="#283a61"/><text x="816" y="230" fill="#e7efff">3  Workspace</text>
        <rect x="802" y="252" width="224" height="38" rx="8" fill="#111a30" stroke="#283a61"/><text x="816" y="276" fill="#e7efff">8  Backup</text>
        <rect x="802" y="298" width="224" height="38" rx="8" fill="#111a30" stroke="#283a61"/><text x="816" y="322" fill="#e7efff">10 Diagnóstico</text>
      </g>
      <text x="806" y="365" fill="#35da8b" font-size="12">● sistema pronto</text>
      <rect x="802" y="160" width="224" height="38" rx="8" fill="none" stroke="#32d8ff" stroke-width="2"><animate attributeName="y" values="160;206;252;298;160" keyTimes="0;.25;.5;.75;1" dur="8s" repeatCount="indefinite"/></rect>
    </g>
  </g>
  <g fill="#32d8ff"><circle cx="1106" cy="106" r="3"><animate attributeName="opacity" values=".2;1;.2" dur="2s" repeatCount="indefinite"/></circle><circle cx="1132" cy="136" r="2"><animate attributeName="opacity" values="1;.2;1" dur="2.8s" repeatCount="indefinite"/></circle><circle cx="1087" cy="161" r="2"><animate attributeName="opacity" values=".2;1;.2" dur="3.2s" repeatCount="indefinite"/></circle></g>
</svg>
